<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0E2A3B">
<meta property="og:title" content="홋카이도 트레킹 8·23~8·29">
<meta property="og:description" content="대설산·아칸·시코츠 렌터카 캠핑 트레킹 6박 7일">
<title>🏔️ 홋카이도 트레킹 2026</title>
<link rel="manifest" href="manifest.json">
<!-- Firebase Realtime Database (compat) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<style>
  :root{
    --ink:#0E2A3B; --ink2:#16384c; --paper:#F3EFE6; --paper2:#ECE6D7;
    --moss:#3E6B4F; --moss-d:#2c4f3a; --snow:#E8EEF1; --stone:#8A9AA3;
    --ember:#C2683B; --ember-d:#a4542d; --sky:#5B8CA8; --line:rgba(14,42,59,.12);
    --gold:#C9A24B; --txt:#1d2b33; --mut:#5a6b74;
    --shadow:0 6px 24px rgba(14,42,59,.10);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard","Noto Sans KR",sans-serif;
    background:var(--paper); color:var(--txt); line-height:1.6;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:560px;margin:0 auto;min-height:100vh;background:var(--paper);position:relative}

  /* ---- HERO ---- */
  .hero{position:relative;height:180px;overflow:hidden;background:var(--ink)}
  .hero img{width:100%;height:100%;object-fit:cover;opacity:.82}
  .hero::after{content:"";position:absolute;inset:0;
    background:linear-gradient(180deg,rgba(14,42,59,.15) 0%,rgba(14,42,59,.55) 60%,rgba(14,42,59,.92) 100%)}
  .hero-body{position:absolute;left:0;right:0;bottom:0;padding:16px 18px 16px;z-index:2;color:#fff}
  .hero-emoji{font-size:24px;filter:drop-shadow(0 2px 6px rgba(0,0,0,.4))}
  .hero h1{margin:4px 0 3px;font-size:24px;font-weight:800;letter-spacing:-.5px;
    text-shadow:0 2px 12px rgba(0,0,0,.4)}
  .hero .sub{font-size:13px;opacity:.95;font-weight:500;text-shadow:0 1px 6px rgba(0,0,0,.5)}
  .badge-view{display:inline-block;margin-left:7px;padding:2px 8px;border-radius:20px;
    background:rgba(255,255,255,.22);font-size:11px;font-weight:600;vertical-align:middle}
  .share-btn{position:absolute;top:16px;right:16px;z-index:3;
    background:rgba(255,255,255,.92);color:var(--ink);border:none;border-radius:22px;
    padding:8px 14px;font-size:13px;font-weight:700;box-shadow:var(--shadow);cursor:pointer}
  .share-btn:active{transform:scale(.95)}

  /* ---- DAY TABS ---- */
  .tabs{display:flex;gap:6px;padding:12px;overflow-x:auto;scrollbar-width:none;
    position:sticky;top:4px;z-index:20;background:var(--paper);border-bottom:1px solid var(--line)}
  .tabs::-webkit-scrollbar{display:none}
  .tab{flex:0 0 auto;min-width:82px;padding:8px 11px;border-radius:13px;border:1.5px solid var(--line);
    background:#fff;cursor:pointer;text-align:center;transition:.18s;position:relative}
  .tab .d{font-size:11px;color:var(--mut);font-weight:600}
  .tab .dt{font-size:12.5px;font-weight:800;color:var(--ink);margin-top:1px;white-space:nowrap}
  .tab .wx{font-size:11px;margin-top:3px;color:var(--sky);font-weight:600;white-space:nowrap}
  .tab.active{background:var(--ink);border-color:var(--ink)}
  .tab.active .d,.tab.active .dt{color:#fff}
  .tab.active .wx{color:#9fd0e6}
  .tab.today::after{content:"오늘";position:absolute;top:-7px;right:-4px;background:var(--ember);
    color:#fff;font-size:9px;font-weight:800;padding:1px 6px;border-radius:10px;box-shadow:0 2px 6px rgba(0,0,0,.2)}

  /* ---- PANELS ---- */
  .panel{display:none;padding:14px 14px 40px;animation:fade .35s}
  .panel.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

  .day-head{background:linear-gradient(135deg,var(--ink),var(--ink2));border-radius:16px;
    padding:15px 16px;color:#fff;margin-bottom:6px;box-shadow:var(--shadow)}
  .day-head .t{font-size:17px;font-weight:800;letter-spacing:-.3px}
  .day-head .s{font-size:12.5px;opacity:.85;margin-top:3px}
  .route-link{display:inline-flex;align-items:center;gap:6px;margin-top:11px;
    background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:#fff;
    padding:7px 13px;border-radius:11px;font-size:12.5px;font-weight:700;text-decoration:none}
  .route-link:active{background:rgba(255,255,255,.28)}

  /* ---- 전체 기간 진행선 (탭 위 얇은 라인) ---- */
  .trip-line{height:4px;margin:0;background:var(--paper2);position:sticky;top:0;z-index:21;overflow:hidden}
  .trip-line .tl-fill{position:absolute;left:0;top:0;bottom:0;
    background:linear-gradient(90deg,var(--moss),var(--ember));transition:width .6s ease}

  /* ---- TIMELINE ---- */
  .tl{position:relative;margin:8px 0 0;padding-left:0}
  .item{position:relative;padding:0 0 4px 70px;margin-top:10px}
  /* 세로 연결선: 점 칸 중앙(왼쪽 56px 지점) */
  .item::before{content:"";position:absolute;left:55px;top:26px;bottom:-12px;width:2px;background:var(--line)}
  .item:last-child::before{display:none}
  /* 시간: 맨 왼쪽 별도 칸(0~48px), 점과 겹치지 않음 */
  .time{position:absolute;left:0;top:3px;width:48px;text-align:right}
  .time .hh{font-size:12.5px;font-weight:800;color:var(--ink);line-height:1.2}
  .time .sub{font-size:9.5px;color:var(--mut);line-height:1.2}
  /* 점: 시간 칸 오른쪽(50~64px) */
  .dot{position:absolute;left:49px;top:5px;width:14px;height:14px;border-radius:50%;
    background:#fff;border:3px solid var(--moss);z-index:2}
  .item.trek .dot{border-color:var(--ember)}
  .item.move .dot{border-color:var(--sky)}
  .item.stay .dot{border-color:var(--gold)}
  .item.air .dot{border-color:var(--ink)}

  .card{background:#fff;border:1px solid var(--line);border-radius:15px;padding:13px 14px;box-shadow:var(--shadow)}
  .kind{font-size:10.5px;font-weight:800;letter-spacing:.4px;text-transform:none;margin-bottom:3px;color:var(--moss)}
  .item.trek .kind{color:var(--ember)} .item.move .kind{color:var(--sky)}
  .item.stay .kind{color:var(--gold)} .item.air .kind{color:var(--ink)}
  .ttl{font-size:15.5px;font-weight:800;color:var(--txt);display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .pin{font-size:13px;text-decoration:none}
  .desc{font-size:13px;color:#3a4850;margin-top:6px;line-height:1.62}
  .desc b{color:var(--ink)}
  .dur{display:inline-block;margin-top:8px;font-size:12px;font-weight:800;color:var(--moss-d);
    background:#E4EFE6;border-radius:8px;padding:3px 10px}
  .item.trek .dur{color:var(--ember-d);background:#FBEAE0}
  .trek-route{display:inline-flex;align-items:center;gap:5px;margin-top:9px;
    background:var(--ember);color:#fff;border:none;border-radius:10px;
    padding:7px 13px;font-size:12.5px;font-weight:700;text-decoration:none;cursor:pointer}
  .trek-route:active{background:var(--ember-d)}
  .item-actions{display:flex;gap:7px;margin-top:10px}
  .item-actions .mini{font-size:11px;padding:4px 10px}
  .add-item{width:100%;padding:10px;border:1.5px dashed var(--stone);background:transparent;border-radius:11px;
    font-size:12.5px;font-weight:700;color:var(--mut);cursor:pointer;margin-top:6px}
  .add-item:active{background:var(--paper2)}
  .chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:9px}
  .chip{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;background:var(--paper2);color:var(--ink2)}
  .chip.warn{background:#FBEAE0;color:var(--ember-d)}
  .chip.good{background:#E4EFE6;color:var(--moss-d)}

  /* course detail block */
  .course{margin-top:9px;background:var(--snow);border-radius:11px;padding:10px 11px;font-size:12.5px;line-height:1.6}
  .course .row{display:flex;gap:7px;padding:2px 0}
  .course .row .ic{flex:0 0 auto}
  .course-head{font-weight:800;color:var(--ink);font-size:12.5px;margin-bottom:4px;display:flex;gap:6px;align-items:center}

  /* booking / info box */
  .info-box{margin-top:9px;border:1px dashed var(--stone);border-radius:11px;padding:10px 12px;background:#fbfaf6}
  .info-box .h{font-size:12.5px;font-weight:800;color:var(--ink);margin-bottom:5px}
  .kv{display:flex;justify-content:space-between;gap:10px;font-size:12px;padding:2px 0;border-bottom:1px dotted var(--line)}
  .kv:last-child{border:none}
  .kv .k{color:var(--mut);font-weight:600;flex:0 0 auto}
  .kv .v{color:var(--txt);font-weight:700;text-align:right}
  .placeholder{color:var(--stone);font-style:italic;font-weight:600}

  /* ---- OPTIONS / NOTES SECTION ---- */
  .section{padding:16px 14px 10px}
  .section h2{font-size:16px;font-weight:800;color:var(--ink);margin:0 0 10px;display:flex;align-items:center;gap:7px}
  .tip{display:flex;gap:9px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:11px 12px;margin-bottom:8px;font-size:12.8px;box-shadow:var(--shadow)}
  .tip .ic{flex:0 0 auto;font-size:16px}
  .tip b{color:var(--ink)}

  .opt-card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:8px;box-shadow:var(--shadow)}
  .opt-card .ot{font-size:13.5px;font-weight:800;color:var(--ink)}
  .opt-card .od{font-size:12.5px;color:#3a4850;margin-top:4px;white-space:pre-wrap}
  .opt-actions{display:flex;gap:8px;margin-top:9px}
  .mini{padding:5px 11px;border-radius:9px;border:1px solid var(--line);background:var(--paper);font-size:11.5px;font-weight:700;cursor:pointer;color:var(--ink)}
  .mini.del{color:var(--ember-d);border-color:#f0d6c8}
  .add-opt{width:100%;padding:11px;border:1.5px dashed var(--stone);background:transparent;border-radius:12px;
    font-size:13px;font-weight:700;color:var(--mut);cursor:pointer}
  .add-opt:active{background:var(--paper2)}

  /* ---- MODAL ---- */
  .ov{display:none;position:fixed;inset:0;background:rgba(14,42,59,.5);z-index:100;align-items:flex-end;justify-content:center}
  .ov.show{display:flex}
  .sheet{background:var(--paper);width:100%;max-width:560px;border-radius:20px 20px 0 0;padding:18px 18px 26px;animation:up .3s}
  @keyframes up{from{transform:translateY(100%)}to{transform:none}}
  .sheet h3{margin:0 0 12px;font-size:16px;font-weight:800;color:var(--ink)}
  .sheet input,.sheet textarea{width:100%;border:1.5px solid var(--line);border-radius:11px;padding:11px;font-size:14px;font-family:inherit;margin-bottom:10px;background:#fff}
  .sheet textarea{min-height:84px;resize:vertical}
  .sheet-actions{display:flex;gap:9px;margin-top:4px}
  .btn{flex:1;padding:12px;border-radius:12px;border:none;font-size:14px;font-weight:800;cursor:pointer}
  .btn.primary{background:var(--ink);color:#fff}
  .btn.ghost{background:var(--paper2);color:var(--ink)}

  .share-row{display:flex;gap:10px;align-items:flex-start;background:#fff;border:1px solid var(--line);border-radius:13px;padding:13px;margin-bottom:11px}
  .share-row .si{font-size:22px}
  .share-row .sh{font-weight:800;font-size:14px;color:var(--ink)}
  .share-row .sd{font-size:12px;color:var(--mut);margin-top:2px}
  .share-row .copy{margin-top:8px;padding:8px 12px;border-radius:9px;border:none;background:var(--ink);color:#fff;font-size:12px;font-weight:700;cursor:pointer}
  .share-row.edit .copy{background:var(--moss)}

  .foot{text-align:center;font-size:11px;color:var(--stone);padding:18px 0 30px}
  .toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:#fff;padding:11px 20px;border-radius:24px;font-size:13px;font-weight:700;
    opacity:0;transition:.3s;z-index:200;box-shadow:0 8px 24px rgba(0,0,0,.3)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="wrap">

  <!-- HERO -->
  <div class="hero">
    <img id="heroImg" alt="홋카이도 대설산" src="https://images.unsplash.com/photo-1542640244-7e672d6cef4e?w=900&q=85&auto=format&fit=crop">
    <button class="share-btn" onclick="openShare()">🔗 공유</button>
    <div class="hero-body">
      <div class="hero-emoji">🏔️</div>
      <h1>홋카이도 트레킹</h1>
      <div class="sub">2026.8.23~8.29 · 6박 7일 · 렌터카+텐트 야영</div>
    </div>
  </div>

  <!-- 전체 기간 진행선 -->
  <div id="tripProgress" class="trip-line"></div>

  <!-- DAY TABS -->
  <div class="tabs" id="tabs"></div>

  <!-- PANELS -->
  <div id="panels"></div>

  <!-- OPTIONS -->
  <div class="section">
    <h2>📝 옵션 입력 <span style="font-size:11px;color:var(--mut);font-weight:600">(예약·메모·추가 후보지)</span></h2>
    <div id="optList"></div>
    <button class="add-opt" onclick="openOpt()">＋ 옵션 추가</button>
  </div>

  <div class="foot">🏔️ 홋카이도 트레킹 2026 · 곰 방울 필수 · 안전 산행</div>
</div>

<!-- OPTION MODAL -->
<div class="ov" id="optOv">
  <div class="sheet">
    <h3 id="optTitle">옵션 추가</h3>
    <input id="optName" placeholder="제목 (예: 렌터카 예약, 야영장 메모)">
    <textarea id="optDesc" placeholder="세부 내용을 입력하세요 (예약번호, 픽업 시간 등)"></textarea>
    <div class="sheet-actions">
      <button class="btn ghost" onclick="closeOpt()">취소</button>
      <button class="btn primary" onclick="saveOpt()">저장</button>
    </div>
  </div>
</div>

<!-- ITEM (일정) MODAL -->
<div class="ov" id="itemOv">
  <div class="sheet" style="max-height:88vh;overflow:auto">
    <h3 id="itemTitle">일정 추가</h3>
    <div style="display:flex;gap:8px">
      <input id="itTime" placeholder="시간 (예: 09:00)" style="flex:1">
      <input id="itSub" placeholder="보조 (예: ~12:00)" style="flex:1">
    </div>
    <select id="itKind" style="width:100%;border:1.5px solid var(--line);border-radius:11px;padding:11px;font-size:14px;margin-bottom:10px;background:#fff;font-family:inherit">
      <option value="trek">🥾 트레킹</option>
      <option value="move">🚗 이동/관광</option>
      <option value="stay">⛺ 숙박/야영</option>
      <option value="air">✈️ 항공</option>
    </select>
    <input id="itKindLabel" placeholder="분류 라벨 (예: 🥾 트레킹 ①)">
    <input id="itTtl" placeholder="제목 (예: 아사히다케 정상 등반)">
    <textarea id="itDesc" placeholder="설명"></textarea>
    <input id="itDur" placeholder="소요시간 (예: 4.5~5시간) — 비우면 표시 안 됨">
    <input id="itPin" placeholder="장소/지도 검색어 (예: 旭岳, 또는 위경도)">
    <input id="itGmap" placeholder="트레킹 경로 목적지(선택) — 비우면 장소 사용">
    <div class="sheet-actions">
      <button class="btn ghost" onclick="closeItem()">취소</button>
      <button class="btn primary" onclick="saveItem()">저장</button>
    </div>
  </div>
</div>

<!-- SHARE MODAL -->
<div class="ov" id="shareOv">
  <div class="sheet">
    <h3>🔗 일정 공유하기</h3>
    <div class="share-row">
      <div class="si">👁️</div>
      <div style="flex:1">
        <div class="sh">보기 전용 링크</div>
        <div class="sd">동행자·지인에게 공유. 수정 없이 일정만 볼 수 있어요.</div>
        <button class="copy" onclick="copyLink('view')">보기 전용 링크 복사</button>
      </div>
    </div>
    <div class="share-row edit">
      <div class="si">✏️</div>
      <div style="flex:1">
        <div class="sh">편집 링크</div>
        <div class="sd">함께 일정을 고칠 사람에게. 옵션 추가·수정 가능.</div>
        <button class="copy" onclick="copyLink('edit')">편집 링크 복사</button>
      </div>
    </div>
    <button class="btn ghost" style="width:100%;margin-top:4px" onclick="closeShare()">닫기</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============ DATA ============ */
const HERO_OPTIONS = [
  "https://images.unsplash.com/photo-1542640244-7e672d6cef4e?w=900&q=85&auto=format&fit=crop"
];

let DAYS = [
  {
    n:1, date:"8/23", dow:"일", wx:"🌥️22°/16°",
    head:"신치토세 도착 → 비에이·시로가네 캠프",
    sub:"입국 · 렌터카 수령 · 식료품/가스 구매 · 첫 야영",
    route:"https://www.google.com/maps/dir/新千歳空港/美瑛町/白金温泉/北海道上川郡美瑛町白金　白金野営場",
    items:[
      {t:"08:20",sub:"출발",k:"air",kind:"✈️ 항공 (가는 편)",ttl:"인천 T2 출발 (대한항공)",pin:"인천국제공항+제2터미널",
        desc:"<b>KE5061</b>편 · 제2터미널(T2) 출발. 국제선이므로 06:00경 도착 권장. 캠핑 장비 위탁수하물 규정·부탄가스 기내반입 불가 확인.",
        box:{h:"✈️ 항공편 (가는 편)",kv:[["편명","KE5061 (대한항공)"],["출발","8/23 08:20 · 인천 T2"],["도착","8/23 11:00 · 신치토세"]]}},
      {t:"11:00",sub:"도착",k:"air",kind:"🛬 도착",ttl:"신치토세 공항 도착",pin:"42.7752,141.6923",
        desc:"입국심사·수하물 수령. 국내선/국제선 터미널 연결통로 이용. 공항 내 편의점에서 현금·교통 준비.",chips:["🛬 신치토세","🇯🇵 입국"]},
      {t:"12:00",sub:"렌터카",k:"move",kind:"🚗 렌터카 수령",ttl:"공항 영업소에서 렌터카 픽업",pin:"42.7752,141.6923",
        desc:"공항 인근 렌터카 영업소에서 차량 수령 후 비에이 방향 출발. <b>예약 정보는 동행자가 입력 예정</b> → 아래 옵션 입력에 추가하세요. 4WD·내비게이션·ETC카드 확인.",

let db = null, optsRef = null, daysRef = null, fbReady = false;
let BASE_DAYS = null; // 코드 원본 백업(초기 시드용)
function initFirebase(){
  try{
    if(!firebaseConfig.databaseURL || firebaseConfig.databaseURL.indexOf("http")!==0){
      console.warn("Firebase 설정 미입력 — 로컬(URL 해시) 모드로 동작");
      return;
    }
    firebase.initializeApp(firebaseConfig);
    db = firebase.database();
    optsRef = db.ref("hokkaido2026/opts");   // 옵션 저장 경로
    daysRef = db.ref("hokkaido2026/days");   // 일정 저장 경로
    fbReady = true;
    // 옵션 실시간 구독
    optsRef.on("value", snap=>{
      const val = snap.val();
      opts = Array.isArray(val)? val : (val? Object.values(val): []);
      renderOpts();
    });
    // 일정 실시간 구독 (없으면 코드 원본으로 1회 시드)
    daysRef.on("value", snap=>{
      const val = snap.val();
      if(!val){
        // 최초 1회: 코드의 기본 일정을 DB에 심음
        daysRef.set(BASE_DAYS).catch(e=>console.error("seed 실패",e));
        return;
      }
      DAYS = normalizeDays(val);
      buildTabs(); buildPanels(); renderTripProgress();
      const ti=todayDayIndex(); if(ti>=0) showDay(ti); else keepActiveDay();
    });
  }catch(e){ console.error("Firebase init 실패:", e); }
}
// Firebase가 객체로 돌려줄 수 있어 배열로 정규화
function normalizeDays(val){
  const arr = Array.isArray(val)? val : Object.values(val);
  return arr.map(d=>({...d, items: Array.isArray(d.items)? d.items : (d.items? Object.values(d.items):[]) }));
}
let _activeDay = 0;
function keepActiveDay(){ showDay(Math.min(_activeDay, DAYS.length-1)); }

function todayDayIndex(){
  const now = new Date();
  const t0 = new Date(2026,7,23), t1 = new Date(2026,7,29,23,59);
  if(now < t0 || now > t1) return -1;
  const diff = Math.floor((new Date(now.getFullYear(),now.getMonth(),now.getDate()) - t0)/86400000);
  return (diff>=0 && diff<7)? diff : -1;
}

// 전체 여행 기간 진행률(%) — 8/23 00:00 ~ 8/30 00:00 기준
function tripProgress(){
  const start = new Date(2026,7,23,0,0).getTime();
  const end   = new Date(2026,7,30,0,0).getTime(); // 8/30 00:00
  const now   = Date.now();
  if(now < start) return 0;
  if(now >= end)  return 100;
  return Math.round((now-start)/(end-start)*100);
}
function renderTripProgress(){
  const el = document.getElementById('tripProgress');
  if(!el) return;
  el.innerHTML = `<div class="tl-fill" style="width:${tripProgress()}%"></div>`;
}

      <div class="dt">${d.date}(${d.dow})</div>
      <div class="wx">${d.wx}</div>

}

function itemHtml(it, di, ii){
  let course = '';
  if(it.course){
    course = `<div class="course"><div class="course-head">${it.course.head}</div>`+
      it.course.rows.map(r=>`<div class="row"><span class="ic">${r[0]}</span><span>${r[1]}</span></div>`).join('')+`</div>`;
  }
  let box='';
  if(it.box){
    box = `<div class="info-box"><div class="h">${it.box.h}</div>`+
      it.box.kv.map(kv=>`<div class="kv"><span class="k">${kv[0]}</span><span class="v ${kv[2]?'placeholder':''}">${kv[1]}</span></div>`).join('')+`</div>`;
  }
  // 소요시간: 별도 줄로 표기
  let dur='';
  if(it.dur){ dur = `<div><span class="dur">⏱️ 소요 ${it.dur}</span></div>`; }
  let chips='';
  if(it.chips && it.chips.length){
    chips = `<div class="chips">`+it.chips.map(c=>{
      let cl='chip'; if(/필수|주의|⚠️|성수기|강풍|추위|활화산/.test(c)) cl='chip warn';
      return `<span class="${cl}">${c}</span>`;}).join('')+`</div>`;
  }
  // 트레킹이면 경로보기 버튼(구글맵 연동)
  let trekRoute='';
  if(it.k==='trek' && (it.gmap||it.pin)){
    const dest = it.gmap || it.pin;
    const url = it.gmap && it.gmap.indexOf('http')===0
      ? it.gmap
      : 'https://www.google.com/maps/dir/?api=1&destination='+encodeURIComponent(dest)+'&travelmode=driving';
    trekRoute = `<div><a class="trek-route" href="${url}" target="_blank">🥾 트레킹 경로 보기</a></div>`;
  }
  const pin = it.pin? `<a class="pin" href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(it.pin)}" target="_blank">📍</a>`:'';
  // 편집 버튼(편집 모드에서만)
  let actions='';
  if(editMode){
    actions = `<div class="item-actions">
      <button class="mini" onclick="openItem(${di},${ii})">수정</button>
      <button class="mini del" onclick="delItem(${di},${ii})">삭제</button>
    </div>`;
  }
  // 진행 상태(지남/현재)
  return `<div class="item ${it.k}">
    <div class="time"><div class="hh">${it.t||''}</div><div class="sub">${it.sub||''}</div></div>
    <div class="dot"></div>
    <div class="card">
      <div class="kind">${it.kind||''}</div>
      <div class="ttl">${it.ttl||''} ${pin}</div>
      <div class="desc">${it.desc||''}</div>
      ${dur}${trekRoute}${course}${box}${chips}${actions}
    </div></div>`;
}

function esc(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}

function openOpt(i){
  editIdx = (typeof i==='number')? i : -1;
  document.getElementById('optTitle').textContent = editIdx>=0? '옵션 수정':'옵션 추가';
  document.getElementById('optName').value = editIdx>=0? opts[editIdx].t : '';
  document.getElementById('optDesc').value = editIdx>=0? opts[editIdx].d : '';
  document.getElementById('optOv').classList.add('show');
}
function closeOpt(){document.getElementById('optOv').classList.remove('show');}
function saveOpt(){
  const t = document.getElementById('optName').value.trim();
  const d = document.getElementById('optDesc').value.trim();
  if(!t){toast('제목을 입력하세요');return;}
  if(editIdx>=0) opts[editIdx]={t,d}; else opts.push({t,d});
  persist(); renderOpts(); closeOpt(); toast('저장되었습니다');
}
function delOpt(i){opts.splice(i,1);persist();renderOpts();toast('삭제되었습니다');}

  if(!ttl){toast('제목을 입력하세요');return;}
  const obj = {
    t: document.getElementById('itTime').value.trim(),
    sub: document.getElementById('itSub').value.trim(),
    k: document.getElementById('itKind').value,
    kind: document.getElementById('itKindLabel').value.trim(),
    ttl: ttl,
    desc: document.getElementById('itDesc').value.trim(),
    dur: document.getElementById('itDur').value.trim(),
    pin: document.getElementById('itPin').value.trim(),
    gmap: document.getElementById('itGmap').value.trim()
  };
  // 기존 course/box/chips 등 구조화 필드는 수정 시 보존
  if(itIdx>=0){ obj.course=DAYS[itDay].items[itIdx].course; obj.box=DAYS[itDay].items[itIdx].box; obj.chips=DAYS[itDay].items[itIdx].chips; }
  if(itIdx>=0) DAYS[itDay].items[itIdx]=obj; else DAYS[itDay].items.push(obj);
  persistDays(); buildPanels(); keepActiveDay(); closeItem(); toast('저장되었습니다');
}
function delItem(di,ii){
  if(!editMode){toast('보기 전용입니다');return;}
  DAYS[di].items.splice(ii,1);
  persistDays(); buildPanels(); keepActiveDay(); toast('삭제되었습니다');
}
function persistDays(){
  if(fbReady && daysRef){ daysRef.set(DAYS).catch(e=>{console.error(e);toast('동기화 실패 — 인터넷 확인');}); }
}

/* persist: Firebase 우선. (해시는 Firebase 미설정 시 백업용으로만 사용) */
function persist(){
  if(fbReady && optsRef){
    optsRef.set(opts).catch(e=>{console.error(e);toast('동기화 실패 — 인터넷 확인');});
    return;
  }
  try{
    const enc = btoa(unescape(encodeURIComponent(JSON.stringify(opts))));
    history.replaceState(null,'', '#'+(editMode?'edit':'view')+'='+enc);
  }catch(e){}
}
function loadFromHash(){
  const h = location.hash.slice(1);
  // 기본은 편집 가능. '#view'로 시작할 때만 보기 전용(공유 링크)
  editMode = !/^view/.test(h);
  if(!h) return;
  const m = h.match(/(view|edit)=(.+)/);
  if(!m) return;
  try{ opts = JSON.parse(decodeURIComponent(escape(atob(m[2])))) || []; }catch(e){ opts=[]; }
}

/* ---- SHARE ---- */
function openShare(){document.getElementById('shareOv').classList.add('show');}
function closeShare(){document.getElementById('shareOv').classList.remove('show');}
function copyLink(kind){
  const base = location.origin + location.pathname;
  let url;
  if(kind==='view'){
    url = base + '#view';   // 보기 전용
  }else{
    url = base;             // 편집 가능(기본). 설치/북마크용
  }
  // Firebase 미설정 시에는 옵션을 링크에 실어 보냄(백업)
  if(!fbReady){
    let enc=''; try{ enc=btoa(unescape(encodeURIComponent(JSON.stringify(opts)))); }catch(e){}
    url = base + '#' + (kind==='view'?'view':'edit') + '=' + enc;
  }
  navigator.clipboard?.writeText(url).then(
    ()=>toast(kind==='edit'?'편집 링크 복사됨 ✏️':'보기 전용 링크 복사됨 👁️'),
    ()=>fallbackCopy(url)
  ) || fallbackCopy(url);
}
function fallbackCopy(url){
  const ta=document.createElement('textarea');ta.value=url;document.body.appendChild(ta);
  ta.select();try{document.execCommand('copy');toast('링크 복사됨');}catch(e){toast('복사 실패 — 길게 눌러 복사');}
  document.body.removeChild(ta);
}

/* ---- TOAST ---- */
let tT;
function toast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(tT);tT=setTimeout(()=>t.classList.remove('show'),2000);
}

function applyMode(){
  if(!editMode){
    // 보기 전용: 옵션 추가 버튼 숨김, 편집 버튼 클릭 차단
    const ao = document.querySelector('.add-opt'); if(ao) ao.style.display='none';
    document.addEventListener('click',e=>{
      if(e.target.classList && e.target.classList.contains('mini')){
        e.stopPropagation();e.preventDefault();toast('보기 전용 링크입니다');
      }
    },true);
  }
}

/* close sheets on backdrop tap */
document.querySelectorAll('.ov').forEach(ov=>ov.addEventListener('click',e=>{if(e.target===ov)ov.classList.remove('show');}));

/* INIT */
loadFromHash();                              // 모드 판정 + (백업)옵션 복원
BASE_DAYS = JSON.parse(JSON.stringify(DAYS)); // 코드 원본 보관(최초 시드용)
initFirebase();                              // Firebase 연동(일정·옵션 실시간 동기화)
buildTabs();
buildPanels();
renderTripProgress();
renderOpts();
applyMode();
// jump to today's tab if within trip
const ti = todayDayIndex();
if(ti>=0) showDay(ti);

// 전체 진행도 1분마다 자동 갱신
setInterval(renderTripProgress, 60000);
</script>
</body>
</html>
